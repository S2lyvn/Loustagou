<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0e1410">
<title>Loustagou — Carte 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

<style>
  :root {
    --volcan:       #0c1410;
    --basalt:       #161e18;
    --basalt-haut:  #1d2620;
    --prairie:      #7a9a52;
    --prairie-vif:  #95b86a;
    --prairie-fonce:#4d6432;
    --lave:         #c66a3c;
    --lave-vif:     #e08454;
    --pierre:       #a09070;
    --pierre-clair: #c5b896;
    --creme:        #f2ede3;
    --creme-papier: #e8e0d0;
    --texte:        #f5f1e8;
    --texte-doux:   rgba(245,241,232,0.62);
    --texte-faible: rgba(245,241,232,0.38);
    --filet:        rgba(245,241,232,0.10);
    --filet-fort:   rgba(245,241,232,0.18);
    --accent:       var(--prairie);
    --accent-vif:   var(--prairie-vif);
    --r-sm: 6px; --r-md: 12px; --r-lg: 22px; --r-xl: 28px;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  }
  body.theme-prairie {
    --volcan: #f2ede3; --basalt: #e8e0d0; --basalt-haut: #ddd3bf;
    --texte: #1a2218; --texte-doux: rgba(26,34,24,0.62); --texte-faible: rgba(26,34,24,0.38);
    --filet: rgba(26,34,24,0.12); --filet-fort: rgba(26,34,24,0.22);
    --pierre: #6b5a3a; --pierre-clair: #4d3f20;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overscroll-behavior: none; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--volcan); color: var(--texte);
    height: 100dvh; overflow: hidden;
    display: flex; flex-direction: column; position: relative;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }

  /* ── SPLASH ── */
  .splash {
    position: fixed; inset: 0; background: var(--volcan); z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
    transition: opacity .8s var(--ease), visibility .8s var(--ease);
  }
  .splash.partie { opacity: 0; visibility: hidden; pointer-events: none; }
  .splash-monts { position: absolute; inset: 0; z-index: 0; opacity: .6; }
  .splash-monts svg { width: 100%; height: 100%; }
  .splash-marque { position: relative; z-index: 2; text-align: center; animation: marqueIn 1.2s var(--ease) both; }
  .splash-petit { font-size: 9px; letter-spacing: 5px; text-transform: uppercase; color: var(--pierre); margin-bottom: 14px; opacity: 0; animation: ligneIn .8s var(--ease) .3s both; }
  .splash-nom { font-family: 'Playfair Display', serif; font-size: 56px; font-weight: 500; letter-spacing: 2px; color: var(--creme); line-height: 1; position: relative; display: inline-block; }
  .splash-nom::before, .splash-nom::after { content: ''; position: absolute; top: 50%; width: 38px; height: 1px; background: var(--accent); transform: scaleX(0); transform-origin: center; animation: filetIn .8s var(--ease) .6s both; }
  .splash-nom::before { right: calc(100% + 18px); transform-origin: right; }
  .splash-nom::after  { left: calc(100% + 18px); transform-origin: left; }
  .splash-sous { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 17px; color: var(--pierre-clair); margin-top: 16px; letter-spacing: 1.5px; opacity: 0; animation: ligneIn .8s var(--ease) .9s both; }
  .splash-table { margin-top: 36px; padding: 8px 22px; border: 1px solid var(--filet-fort); border-radius: 100px; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent-vif); opacity: 0; animation: ligneIn .8s var(--ease) 1.2s both; }
  .splash-charge { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); width: 80px; height: 1px; background: var(--filet); overflow: hidden; opacity: 0; animation: ligneIn .8s var(--ease) 1.5s both; }
  .splash-charge::after { content: ''; position: absolute; inset: 0; background: var(--accent); animation: chargeBar 2s var(--ease) 1.5s forwards; }
  @keyframes marqueIn { from { transform: translateY(8px); } to { transform: translateY(0); } }
  @keyframes ligneIn { to { opacity: 1; } }
  @keyframes filetIn { to { transform: scaleX(1); } }
  @keyframes chargeBar { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

  /* ── HEADER ── */
  .header { padding: 14px 18px 12px; background: var(--volcan); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; position: relative; z-index: 10; }
  .header::after { content: ''; position: absolute; left: 18px; right: 18px; bottom: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--filet) 20%, var(--filet) 80%, transparent); }
  .marque { display: flex; flex-direction: column; line-height: 1; }
  .marque-nom { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: var(--texte); cursor: default; }
  .marque-sous { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 11px; letter-spacing: 1.5px; color: var(--pierre); margin-top: 3px; }
  .table-pastille { display: flex; align-items: center; gap: 8px; padding: 7px 12px 7px 9px; border: 1px solid var(--filet); border-radius: 100px; background: var(--basalt); }
  .table-pastille .pt { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .table-pastille .lib { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--texte-doux); }
  .table-pastille .num { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 600; color: var(--texte); line-height: 1; }

  /* ── CATEGORIES ── */
  .categories { position: relative; flex-shrink: 0; padding: 14px 18px 10px; display: flex; align-items: center; gap: 4px; z-index: 10; background: var(--volcan); }
  .cat-piste { display: flex; gap: 2px; position: relative; flex: 1; overflow-x: auto; scrollbar-width: none; padding: 3px; background: var(--basalt); border-radius: 100px; border: 1px solid var(--filet); }
  .cat-piste::-webkit-scrollbar { display: none; }
  .cat-pillule { flex: 0 0 auto; position: relative; padding: 9px 16px; font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--texte-doux); border: none; background: transparent; border-radius: 100px; cursor: pointer; transition: color .25s var(--ease); white-space: nowrap; font-family: 'Inter', sans-serif; }
  .cat-pillule.actif { color: var(--volcan); }
  body.theme-prairie .cat-pillule.actif { color: var(--creme); }
  .cat-indicateur { position: absolute; top: 3px; bottom: 3px; background: var(--accent); border-radius: 100px; transition: left .45s var(--ease), width .45s var(--ease); z-index: 0; }
  .cat-pillule > span { position: relative; z-index: 1; }

  /* ── SCENE 3D ── */
  .scene { flex: 1; position: relative; overflow: hidden; min-height: 0; background: radial-gradient(ellipse 80% 50% at 50% 100%, rgba(122,154,82,0.10), transparent 70%), linear-gradient(180deg, #050907 0%, #0a120c 30%, #0e1a10 55%, #0e1a11 80%, #0c1410 100%); }
  .etoiles { position: absolute; inset: 0; background-image: radial-gradient(1px 1px at 14% 18%, rgba(245,241,232,0.6), transparent 60%), radial-gradient(1px 1px at 27% 9%, rgba(245,241,232,0.35), transparent 60%), radial-gradient(1px 1px at 42% 22%, rgba(245,241,232,0.5), transparent 60%), radial-gradient(1px 1px at 58% 14%, rgba(245,241,232,0.3), transparent 60%), radial-gradient(1px 1px at 71% 7%, rgba(245,241,232,0.45), transparent 60%), radial-gradient(1px 1px at 84% 19%, rgba(245,241,232,0.55), transparent 60%), radial-gradient(1px 1px at 92% 11%, rgba(245,241,232,0.3), transparent 60%); z-index: 1; animation: scintille 4s ease-in-out infinite alternate; }
  @keyframes scintille { from { opacity: .35; } to { opacity: .75; } }
  .monts { position: absolute; bottom: 0; left: 0; width: 100%; height: 70%; pointer-events: none; z-index: 1; }
  .monts svg { width: 100%; height: 100%; display: block; }
  .mont-couche { transition: transform 1.2s var(--ease); transform-origin: bottom; }
  .braises { position: absolute; inset: 0; pointer-events: none; z-index: 2; overflow: hidden; }
  .braise { position: absolute; bottom: -10px; width: 2px; height: 2px; border-radius: 50%; background: var(--lave-vif); box-shadow: 0 0 6px var(--lave-vif); opacity: 0; animation: monteBraise linear infinite; }
  @keyframes monteBraise { 0% { transform: translate(0,0) scale(.6); opacity: 0; } 15% { opacity: 1; } 85% { opacity: .6; } 100% { transform: translate(var(--drift,20px),-100vh) scale(0); opacity: 0; } }
  body.particules-off .braises { display: none; }
  .lueur { position: absolute; left: 50%; bottom: -30%; transform: translateX(-50%); width: 90%; height: 60%; background: radial-gradient(ellipse at center, rgba(122,154,82,0.22), transparent 70%); z-index: 1; filter: blur(20px); pointer-events: none; animation: lueurPulse 5s ease-in-out infinite alternate; }
  @keyframes lueurPulse { from { opacity: .55; } to { opacity: .95; } }
  .modele-wrap { position: absolute; inset: 0; z-index: 3; transition: opacity .35s var(--ease), transform .45s var(--ease); }
  model-viewer { width: 100%; height: 100%; --poster-color: transparent; }

  /* Assiette placeholder */
  .assiette-placeholder { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 78%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .assiette-disque { position: absolute; inset: 8%; border-radius: 50%; background: radial-gradient(ellipse at 35% 35%, rgba(245,241,232,0.08), transparent 60%), radial-gradient(ellipse at 70% 70%, rgba(0,0,0,0.4), transparent 70%), conic-gradient(from 220deg, #2a2218, #3b2f1f, #2a2218, #1a140e, #2a2218); box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 30px 60px -10px rgba(0,0,0,0.65); animation: tournePlat 25s linear infinite; }
  .assiette-cercle { position: absolute; inset: 16%; border-radius: 50%; border: 1px dashed var(--filet-fort); animation: tournePlat 60s linear infinite reverse; }
  .assiette-emblem { position: relative; z-index: 2; font-family: 'Playfair Display', serif; font-style: italic; font-size: 32px; color: var(--pierre-clair); text-shadow: 0 4px 20px rgba(0,0,0,0.7); }
  @keyframes tournePlat { to { transform: rotate(360deg); } }

  /* ── Info plat haut ── */
  .info-haut { position: absolute; top: 0; left: 0; right: 0; padding: 22px 22px 80px; background: linear-gradient(180deg, rgba(8,14,10,0.85) 0%, rgba(8,14,10,0.45) 50%, rgba(8,14,10,0) 100%); pointer-events: none; z-index: 4; }
  .info-rang { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 9px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); padding: 5px 10px; border-radius: 3px; background: rgba(122,154,82,0.12); border: 1px solid rgba(122,154,82,0.35); }
  .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: bat 1.6s ease-in-out infinite; }
  @keyframes bat { 50% { opacity: .4; } }
  .badge.bientot { color: var(--pierre); background: rgba(160,144,112,0.10); border-color: rgba(160,144,112,0.35); }
  .badge.bientot::before { background: var(--pierre); box-shadow: none; animation: none; }
  .terroir-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 9px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--pierre-clair); padding: 5px 10px; border-radius: 3px; border: 1px solid var(--filet); }
  .terroir-pill svg { width: 9px; height: 9px; }
  .nom-plat { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 600; color: var(--texte); line-height: 1.08; letter-spacing: -0.3px; text-shadow: 0 2px 18px rgba(0,0,0,0.6); }
  .desc-plat { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 14px; color: var(--texte-doux); margin-top: 8px; line-height: 1.5; max-width: 88%; }
  .prix-plat { display: inline-flex; align-items: baseline; gap: 4px; font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 500; color: var(--accent-vif); margin-top: 14px; letter-spacing: 0.5px; }
  .prix-plat .sym { font-size: 14px; color: var(--pierre-clair); }

  /* ── Swipe / pagination ── */
  .indic-swipe { position: absolute; top: 50%; transform: translateY(-50%); width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--filet-fort); background: rgba(12,20,16,0.55); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 5; cursor: pointer; transition: opacity .25s var(--ease), background .25s var(--ease); opacity: 0.55; }
  .indic-swipe:hover, .indic-swipe:active { opacity: 1; background: rgba(122,154,82,0.25); }
  .indic-swipe.gauche { left: 14px; }
  .indic-swipe.droite { right: 14px; }
  .indic-swipe svg { width: 14px; height: 14px; stroke: var(--creme); }
  .indic-swipe.cache { opacity: 0; pointer-events: none; }
  .pagination { position: absolute; bottom: 84px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 5; }
  .pagination .pt-pag { width: 5px; height: 5px; border-radius: 50%; background: var(--filet-fort); transition: all .3s var(--ease); }
  .pagination .pt-pag.actif { background: var(--accent); width: 18px; border-radius: 100px; }

  /* ── Bouton AR ── */
  .btn-ar { position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%); display: inline-flex; align-items: center; gap: 10px; padding: 13px 22px; border-radius: 100px; background: var(--accent); color: var(--volcan); font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border: none; z-index: 5; box-shadow: 0 10px 30px -10px rgba(122,154,82,0.6), 0 0 0 1px rgba(149,184,106,0.5); overflow: hidden; transition: transform .15s var(--ease); }
  body.theme-prairie .btn-ar { color: var(--creme); }
  .btn-ar:active { transform: translateX(-50%) scale(.96); }
  .btn-ar::before { content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent); animation: shimmer 3s ease-in-out infinite; }
  @keyframes shimmer { 50%, 100% { left: 140%; } }
  .btn-ar svg { width: 16px; height: 16px; position: relative; z-index: 1; }
  .btn-ar span { position: relative; z-index: 1; }
  .btn-ar.bientot { background: var(--basalt-haut); color: var(--pierre); box-shadow: none; border: 1px solid var(--filet); }
  .btn-ar.bientot::before { display: none; }

  /* ── Overlay chargement ── */
  .overlay-charge { position: absolute; inset: 0; background: rgba(12,20,16,0.6); backdrop-filter: blur(6px); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 6; color: var(--texte); }
  .overlay-charge.visible { display: flex; }
  .spinner { width: 32px; height: 32px; border: 1px solid var(--filet); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .charge-texte { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--pierre-clair); }

  /* ── BOTTOM SHEET ── */
  .sheet { flex-shrink: 0; background: var(--basalt); border-top-left-radius: var(--r-xl); border-top-right-radius: var(--r-xl); border-top: 1px solid var(--filet); box-shadow: 0 -20px 40px -20px rgba(0,0,0,0.6); position: relative; transition: height .5s var(--ease); overflow: hidden; z-index: 8; }
  .sheet[data-etat="ferme"]  { height: 210px; }
  .sheet[data-etat="ouvert"] { height: 70dvh; }
  .sheet-poignee { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 38px; height: 4px; border-radius: 100px; background: var(--filet-fort); cursor: pointer; z-index: 2; }
  .sheet-corps { height: 100%; overflow-y: auto; overscroll-behavior: contain; padding: 28px 0 32px; scrollbar-width: none; }
  .sheet-corps::-webkit-scrollbar { display: none; }
  .menu-strip { padding: 0 18px 14px; }
  .menu-titre { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--pierre); display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .menu-titre::after { content: ''; flex: 1; height: 1px; background: var(--filet); }
  .liste-plats { display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: 4px; margin: 0 -18px; padding-left: 18px; padding-right: 18px; scroll-snap-type: x mandatory; }
  .liste-plats::-webkit-scrollbar { display: none; }
  .carte-plat { flex: 0 0 auto; background: var(--basalt-haut); border: 1px solid var(--filet); border-radius: var(--r-md); padding: 11px 14px 12px; cursor: pointer; transition: all .25s var(--ease); text-align: left; min-width: 138px; max-width: 165px; position: relative; overflow: hidden; scroll-snap-align: start; font-family: 'Inter', sans-serif; color: var(--texte); }
  .carte-plat::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: transparent; transition: background .25s var(--ease); }
  .carte-plat.actif { background: rgba(122,154,82,0.14); border-color: rgba(122,154,82,0.4); transform: translateY(-2px); }
  .carte-plat.actif::before { background: var(--accent); }
  .carte-plat.manquant { opacity: .42; }
  .carte-plat .cat-tag { font-size: 8px; font-weight: 600; letter-spacing: 1.4px; text-transform: uppercase; color: var(--pierre); display: block; margin-bottom: 5px; }
  .carte-plat.actif .cat-tag { color: var(--accent-vif); }
  .carte-plat .lbl { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 600; color: var(--texte); display: block; line-height: 1.15; }
  .carte-plat .prx { font-size: 11px; color: var(--texte-faible); display: block; margin-top: 6px; font-weight: 500; }
  .carte-plat.actif .prx { color: var(--accent-vif); }

  /* ── Détails sheet ── */
  .details { padding: 18px 22px 0; opacity: 0; transform: translateY(8px); transition: opacity .35s var(--ease) .15s, transform .35s var(--ease) .15s; pointer-events: none; }
  .sheet[data-etat="ouvert"] .details { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .details-bandeau { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; margin-bottom: 18px; padding-bottom: 16px; border-bottom: 1px solid var(--filet); }
  .details-bandeau-g { display: flex; flex-direction: column; }
  .details-titre { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; color: var(--texte); line-height: 1.1; }
  .details-sous { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 12px; color: var(--pierre-clair); margin-top: 3px; }
  .icone-rond { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--filet); background: var(--basalt); display: flex; align-items: center; justify-content: center; color: var(--texte-doux); cursor: pointer; transition: all .2s var(--ease); }
  .icone-rond svg { width: 16px; height: 16px; }
  .section { margin-bottom: 22px; }
  .section-titre { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--pierre); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .section-titre .ico { width: 14px; height: 14px; color: var(--accent); }
  .ingredients { display: flex; flex-direction: column; gap: 10px; }
  .ingredient { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--r-md); background: var(--basalt-haut); border: 1px solid var(--filet); }
  .ingredient .ico-rond { width: 28px; height: 28px; border-radius: 50%; background: rgba(122,154,82,0.18); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .ingredient .ico-rond svg { width: 12px; height: 12px; stroke: var(--accent-vif); }
  .ingredient-corps { flex: 1; min-width: 0; }
  .ingredient-nom { font-size: 13px; font-weight: 500; color: var(--texte); line-height: 1.2; }
  .ingredient-origine { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 11px; color: var(--pierre-clair); margin-top: 2px; display: flex; align-items: center; gap: 5px; }
  .ingredient-origine svg { width: 9px; height: 9px; flex-shrink: 0; }
  .accord { padding: 14px 16px; border-radius: var(--r-md); background: linear-gradient(135deg, rgba(198,106,60,0.14), var(--basalt-haut) 60%); border: 1px solid rgba(198,106,60,0.25); display: flex; gap: 12px; align-items: flex-start; }
  .accord-verre { width: 32px; height: 40px; flex-shrink: 0; color: var(--lave-vif); }
  .accord-corps { flex: 1; }
  .accord-nom { font-family: 'Playfair Display', serif; font-size: 14px; color: var(--texte); font-weight: 600; }

  .allergenes { display: flex; flex-wrap: wrap; gap: 6px; }

  .btn-principal { flex: 1; padding: 14px 18px; border-radius: 100px; background: var(--accent); color: var(--volcan); font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform .15s var(--ease); box-shadow: 0 8px 20px -8px rgba(122,154,82,0.6); }
  .btn-principal:active { transform: scale(.97); }
  .btn-principal svg { width: 14px; height: 14px; }

  /* ── TWEAKS ── */
  .tweaks { position: fixed; right: 14px; bottom: 14px; width: 270px; background: rgba(12,20,16,0.92); backdrop-filter: blur(14px); border: 1px solid var(--filet-fort); border-radius: 14px; padding: 14px; z-index: 200; color: var(--texte); font-family: 'Inter', sans-serif; display: none; box-shadow: 0 20px 50px -10px rgba(0,0,0,0.7); }
  .tweaks.visible { display: block; }
  .tweaks h3 { font-family: 'Playfair Display', serif; font-size: 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .tweaks h3 button { background: none; border: 1px solid var(--filet); color: var(--texte-doux); width: 22px; height: 22px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .tweak { margin-bottom: 12px; }
  .tweak-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--pierre); margin-bottom: 6px; }
  .tweak-options { display: flex; gap: 4px; background: var(--basalt); padding: 3px; border-radius: 100px; border: 1px solid var(--filet); }
  .tweak-opt { flex: 1; padding: 7px 8px; font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; border: none; background: transparent; color: var(--texte-doux); border-radius: 100px; cursor: pointer; font-family: inherit; }
  .tweak-opt.actif { background: var(--accent); color: var(--volcan); }
  .tweak-swatches { display: flex; gap: 6px; }
  .tweak-sw { flex: 1; height: 30px; border-radius: 6px; border: 1px solid var(--filet); cursor: pointer; position: relative; }
  .tweak-sw.actif::after { content: ''; position: absolute; inset: -3px; border: 1px solid var(--texte); border-radius: 8px; }

  @media (min-width: 600px) {
    body { max-width: 480px; margin: 0 auto; box-shadow: 0 0 40px rgba(0,0,0,0.5); }

</style>

<script>
(function () {
    'use strict';

    // ══════════════════════════════════════════════════════
    // MENU DE LOUSTAGOU — Cuisine Auvergnate
    // Modèles hébergés sur GitHub (dossier bella-italia/models)
    // Pour ajouter un modèle propre : déposer dans loustagou/models/
    // et remplacer l'URL ci-dessous par la sienne
    // ══════════════════════════════════════════════════════
    const MODELES = 'https://raw.githubusercontent.com/s2lyvn/MonResto/main/restaurants/bella-italia/models/';

    const PLATS = [
        {
            id: 'truffade', categorie: 'Plats', label: 'Truffade',
            nom: 'Truffade du Cantal', terroir: 'Cantal',
            description: "Pommes de terre fondantes, tomme fraîche du Cantal, lard fumé, ail de montagne",
            prix: '18,00', modele: null, ios: null,
            ingredients: [
                { nom: 'Pommes de terre', origine: 'Plateau de la Planèze, Cantal' },
                { nom: 'Tomme fraîche', origine: 'Fromagerie Salers, AOP Cantal' },
                { nom: 'Lard fumé', origine: 'Charcuterie Gayrard, Aurillac' },
            ],
            accord: { nom: 'Corent Rouge', region: "AOC Côtes d'Auvergne", note: "Un rouge léger aux arômes de fruits rouges, idéal avec les plats de caractère.", prix: '24,00' },
            noteChef: "La truffade, c'est l'âme de l'Auvergne. Je la prépare comme ma grand-mère, avec patience et la tomme fraîche du jour.",
            allergenes: ['Lait', 'Sulfites'],
        },
        {
            id: 'cake-mami', categorie: 'Desserts', label: 'Cake de Mami',
            nom: 'Le Cake de Mami', terroir: 'Tradition',
            description: "Cake aux fruits confits, noix de Grenoble et beurre noisette, servi légèrement tiède",
            prix: '6,00', modele: MODELES + 'cake-mami.glb', ios: MODELES + 'cake-mami.usdz',
            ingredients: [
                { nom: 'Noix de Grenoble', origine: 'AOP Noix de Grenoble' },
                { nom: 'Beurre noisette', origine: 'Laiterie du Massif Central' },
                { nom: 'Fruits confits', origine: 'Maison Lilamand, Saint-Rémy' },
            ],
            accord: { nom: 'Muscat de Beaumes', region: 'AOC Beaumes de Venise', note: "Sa douceur miellée et ses notes d'abricot subliment le fondant du cake.", prix: '18,00' },
            noteChef: "Ce cake, c'est la recette de ma maman. Je n'ai changé qu'une chose : un peu plus de beurre noisette.",
            allergenes: ['Gluten', 'Œufs', 'Lait', 'Fruits à coque'],
        },
        {
            id: 'tarte-mami', categorie: 'Desserts', label: 'Tarte de Mami',
            nom: 'La Tarte de Mami', terroir: 'Artense',
            description: "Tarte aux myrtilles sauvages du plateau de l'Artense, crème fraîche d'Auvergne",
            prix: '7,00', modele: MODELES + 'tarte-mami.glb', ios: MODELES + 'tarte-mami.usdz',
            ingredients: [
                { nom: 'Myrtilles sauvages', origine: "Plateau de l'Artense, 900m" },
                { nom: 'Crème fraîche', origine: 'Ferme des Prades, Cézallier' },
                { nom: 'Pâte brisée', origine: "Farine de blé ancien d'Auvergne" },
            ],
            accord: { nom: 'Chardonnay Auvergnat', region: 'IGP Puy-de-Dôme', note: "Sa fraîcheur et ses notes citronnées équilibrent la douceur des myrtilles.", prix: '16,00' },
            noteChef: "Les myrtilles, je les cueille moi-même chaque été sur les hauteurs de l'Artense. Un rituel que je ne délègue à personne.",
            allergenes: ['Gluten', 'Œufs', 'Lait'],
        },
        {
            id: 'salers', categorie: 'Plats', label: 'Pièce de Salers',
            nom: 'Bœuf de Salers', terroir: 'Salers',
            description: "Bœuf de Salers élevé sur les volcans, sauce aux cèpes du Massif Central, gratin dauphinois",
            prix: '26,00', modele: null, ios: null,
            ingredients: [
                { nom: 'Bœuf de Salers', origine: 'Élevage Chanat, Salers, IGP' },
                { nom: 'Cèpes du Massif Central', origine: 'Cueillette locale, automne' },
                { nom: 'Gratin dauphinois', origine: 'Pommes de terre de Planèze' },
            ],
            accord: { nom: 'Chateaugay Rouge', region: "AOC Côtes d'Auvergne", note: "Un rouge structuré aux tanins soyeux, parfait compagnon du bœuf de Salers.", prix: '28,00' },
            noteChef: "Le Salers, c'est une race qui passe sa vie en plein air sur les volcans. Une viande d'exception qui mérite le respect.",
            allergenes: ['Lait', 'Sulfites'],
        },
    ];

    // ── Tweaks par défaut ──
    const TWEAKS = { theme: 'volcan', accent: 'prairie', particules: 'off' };

    // ── URL ──
    const params  = new URLSearchParams(window.location.search);
    const tableNum = params.get('table') || '—';

    // ── DOM ──
    const splash        = document.getElementById('splash');
    const splashTable   = document.getElementById('splash-table');
    const headerTable   = document.getElementById('header-table');
    const catPiste      = document.getElementById('cat-piste');
    const listePlats    = document.getElementById('liste-plats');
    const viewer        = document.getElementById('viewer');
    const overlayCharge = document.getElementById('overlay-charge');
    const chargeTexte   = document.getElementById('charge-texte');
    const badge         = document.getElementById('badge');
    const nomPlatEl     = document.getElementById('nom-plat');
    const descPlatEl    = document.getElementById('desc-plat');
    const prixPlatEl    = document.getElementById('prix-plat');
    const terroirLib    = document.getElementById('terroir-lib');
    const pagination    = document.getElementById('pagination');
    const btnPrec       = document.getElementById('prec');
    const btnSuiv       = document.getElementById('suiv');
    const sheet         = document.getElementById('sheet');
    const scene         = document.getElementById('scene');

    // ── État ──
    let catActive = 'Tous';
    let platActifIndex = 0;
    let platsFiltres = [];
    let loadTimeout = null;
    let sheetOuvert = false;

    // ── Table ──
    splashTable.textContent = tableNum !== '—' ? 'Table ' + tableNum : 'Table —';
    headerTable.textContent = tableNum;

    // ── Splash ──
    setTimeout(() => splash.classList.add('partie'), 2600);

    // ── Braises ──
    const braisesCont = document.getElementById('braises');
    for (let i = 0; i < 14; i++) {
        const b = document.createElement('div');
        b.className = 'braise';
        const dur = 5 + Math.random() * 8;
        const del = Math.random() * 8;
        b.style.cssText = `left:${Math.random()*100}%;animation-duration:${dur}s;animation-delay:${del}s;--drift:${(Math.random()-.5)*60}px`;
        braisesCont.appendChild(b);
    }

    // ── Catégories ──
    function construireCats() {
        const cats = ['Tous', ...[...new Set(PLATS.map(p => p.categorie))]];
        const ind = document.getElementById('cat-indicateur');
        catPiste.innerHTML = '';
        catPiste.appendChild(ind);
        cats.forEach((cat, i) => {
            const btn = document.createElement('button');
            btn.className = 'cat-pillule' + (i === 0 ? ' actif' : '');
            btn.innerHTML = `<span>${cat}</span>`;
            btn.addEventListener('click', () => {
                catPiste.querySelectorAll('.cat-pillule').forEach(b => b.classList.remove('actif'));
                btn.classList.add('actif');
                positionnerIndicateur(btn);
                catActive = cat;
                filtrerPlats(cat);
            });
            catPiste.appendChild(btn);
        });
        setTimeout(() => {
            const first = catPiste.querySelector('.cat-pillule.actif');
            if (first) positionnerIndicateur(first);
        }, 60);
        filtrerPlats('Tous');
    }

    function positionnerIndicateur(btn) {
        const ind = catPiste.querySelector('.cat-indicateur');
        if (!ind) return;
        ind.style.left  = btn.offsetLeft + 'px';
        ind.style.width = btn.offsetWidth + 'px';
    }

    function filtrerPlats(cat) {
        platsFiltres = cat === 'Tous' ? [...PLATS] : PLATS.filter(p => p.categorie === cat);
        platActifIndex = 0;
        construireCartes();
        construirePagination();
        majNavigation();
        afficherPlat(platsFiltres[0]);
    }

    // ── Cartes ──
    function construireCartes() {
        listePlats.innerHTML = '';
        platsFiltres.forEach((plat, i) => {
            const btn = document.createElement('button');
            btn.className = 'carte-plat' + (i === 0 ? ' actif' : '') + (!plat.modele ? ' manquant' : '');
            btn.innerHTML = `<span class="cat-tag">${plat.categorie}</span><span class="lbl">${plat.label}</span><span class="prx">${plat.prix} €</span>`;
            btn.addEventListener('click', () => {
                platActifIndex = i;
                afficherPlat(plat);
                majCarteActive();
                majPagination();
                majNavigation();
            });
            listePlats.appendChild(btn);
        });
    }

    function majCarteActive() {
        listePlats.querySelectorAll('.carte-plat').forEach((c, i) => c.classList.toggle('actif', i === platActifIndex));
        const active = listePlats.querySelectorAll('.carte-plat')[platActifIndex];
        if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }

    // ── Pagination ──
    function construirePagination() {
        pagination.innerHTML = '';
        platsFiltres.forEach((_, i) => {
            const d = document.createElement('div');
            d.className = 'pt-pag' + (i === 0 ? ' actif' : '');
            pagination.appendChild(d);
        });
    }

    function majPagination() {
        pagination.querySelectorAll('.pt-pag').forEach((d, i) => d.classList.toggle('actif', i === platActifIndex));
    }

    function majNavigation() {
        btnPrec.classList.toggle('cache', platActifIndex === 0);
        btnSuiv.classList.toggle('cache', platActifIndex >= platsFiltres.length - 1);
    }

    btnPrec.addEventListener('click', () => { if (platActifIndex > 0) { platActifIndex--; afficherPlat(platsFiltres[platActifIndex]); majCarteActive(); majPagination(); majNavigation(); } });
    btnSuiv.addEventListener('click', () => { if (platActifIndex < platsFiltres.length - 1) { platActifIndex++; afficherPlat(platsFiltres[platActifIndex]); majCarteActive(); majPagination(); majNavigation(); } });

    // Swipe sur la scène
    let swipeX = 0;
    scene.addEventListener('touchstart', e => { swipeX = e.touches[0].clientX; }, { passive: true });
    scene.addEventListener('touchend', e => {
        const d = swipeX - e.changedTouches[0].clientX;
        if (Math.abs(d) > 50) { if (d > 0) btnSuiv.click(); else btnPrec.click(); }
    }, { passive: true });

    // ── Afficher plat ──
    function cacherChargement() {
        clearTimeout(loadTimeout);
        overlayCharge.classList.remove('visible');
    }

    viewer.addEventListener('progress', e => {
        const pct = Math.round(e.detail.totalProgress * 100);
        chargeTexte.textContent = 'Chargement — ' + pct + ' %';
        if (pct >= 100) { clearTimeout(loadTimeout); loadTimeout = setTimeout(cacherChargement, 800); }
    });
    viewer.addEventListener('load', cacherChargement);

    function afficherPlat(plat) {
        nomPlatEl.textContent  = plat.nom;
        descPlatEl.textContent = plat.description;
        prixPlatEl.innerHTML   = plat.prix + ' <span class="sym">€</span>';
        terroirLib.textContent = plat.terroir;

        if (plat.modele) {
            badge.textContent = 'AR disponible';
            badge.classList.remove('bientot');
            overlayCharge.classList.add('visible');
            chargeTexte.textContent = 'Chargement';
            if (plat.ios) { viewer.setAttribute('ios-src', plat.ios); } else { viewer.removeAttribute('ios-src'); }
            viewer.src = plat.modele;
        } else {
            badge.textContent = 'Bientôt disponible';
            badge.classList.add('bientot');
            cacherChargement();
        }

        remplirDetails(plat);
    }

    function remplirDetails(plat) {
        document.getElementById('d-titre').textContent = plat.nom;
        document.getElementById('d-sous').textContent  = plat.description;

        // Ingrédients
        const ingEl = document.getElementById('ingredients');
        ingEl.innerHTML = '';
        (plat.ingredients || []).forEach(ing => {
            const el = document.createElement('div');
            el.className = 'ingredient';
            el.innerHTML = `
                <div class="ico-rond"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/></svg></div>
                <div class="ingredient-corps">
                    <div class="ingredient-nom">${ing.nom}</div>
                    <div class="ingredient-origine">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                        ${ing.origine}
                    </div>
                </div>`;
            ingEl.appendChild(el);
        });

        // Accord
        const sectAccord = document.getElementById('section-accord');
        if (plat.accord) {
            sectAccord.style.display = '';
            document.getElementById('accord').innerHTML = `
                <svg class="accord-verre" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 22h8M12 15v7M5 3h14l-2 9a5 5 0 01-10 0L5 3z"/></svg>
                <div class="accord-corps">
                    <div class="accord-nom">${plat.accord.nom}</div>
                    <div class="accord-region">${plat.accord.region}</div>
                    <div class="accord-note">${plat.accord.note}</div>
                    <div class="accord-prix">${plat.accord.prix} <span class="sub">€ / bouteille</span></div>
                </div>`;
        } else { sectAccord.style.display = 'none'; }

        // Note chef
        document.getElementById('note-chef').innerHTML = plat.noteChef + '<span class="note-chef-sig">— Le Chef</span>';

        // Allergènes
        const algEl = document.getElementById('allergenes');
        algEl.innerHTML = '';
        (plat.allergenes || []).forEach(a => {
            const tag = document.createElement('span');
            tag.className = 'allergene';
            tag.textContent = a;
            algEl.appendChild(tag);
        });
    }

    // ── Bottom sheet ──
    let touchStartY = 0;
    const sheetPoignee = document.getElementById('sheet-poignee');
    sheetPoignee.addEventListener('click', () => {
        sheetOuvert = !sheetOuvert;
        sheet.dataset.etat = sheetOuvert ? 'ouvert' : 'ferme';
    });
    sheet.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
    sheet.addEventListener('touchend', e => {
        const d = touchStartY - e.changedTouches[0].clientY;
        if (Math.abs(d) > 40) { sheetOuvert = d > 0; sheet.dataset.etat = sheetOuvert ? 'ouvert' : 'ferme'; }
    }, { passive: true });

    // Bouton appel serveur
    document.getElementById('btn-appel').addEventListener('click', function () {
        this.style.opacity = '.7';
        setTimeout(() => { this.style.opacity = ''; }, 1200);
    });

    // ── Tweaks ──
    const ACCENTS = {
        prairie:  { a: '#7a9a52', av: '#95b86a' },
        lave:     { a: '#c66a3c', av: '#e08454' },
        basalte:  { a: '#5e6b76', av: '#7a8fa0' },
        gentiane: { a: '#3a6a9a', av: '#5a8ac0' },
    };

    function appliquerTweaks(tw) {
        document.body.classList.toggle('theme-prairie', tw.theme === 'prairie');
        document.body.classList.toggle('particules-off', tw.particules === 'off');
        const a = ACCENTS[tw.accent] || ACCENTS.prairie;
        document.documentElement.style.setProperty('--prairie', a.a);
        document.documentElement.style.setProperty('--prairie-vif', a.av);
        document.documentElement.style.setProperty('--accent', a.a);
        document.documentElement.style.setProperty('--accent-vif', a.av);
        document.querySelectorAll('[data-tweak] .tweak-opt, [data-tweak] .tweak-sw').forEach(opt => {
            opt.classList.toggle('actif', opt.dataset.val === tw[opt.closest('[data-tweak]').dataset.tweak]);
        });
    }

    document.querySelectorAll('[data-tweak] .tweak-opt, [data-tweak] .tweak-sw').forEach(btn => {
        btn.addEventListener('click', () => {
            TWEAKS[btn.closest('[data-tweak]').dataset.tweak] = btn.dataset.val;
            appliquerTweaks(TWEAKS);
        });
    });

    document.getElementById('tweaks-fermer').addEventListener('click', () => document.getElementById('tweaks').classList.remove('visible'));

    // Triple-tap sur le nom pour ouvrir tweaks
    let tapCount = 0, tapTimer = null;
    document.getElementById('marque-nom').addEventListener('click', () => {
        tapCount++;
        clearTimeout(tapTimer);
        tapTimer = setTimeout(() => { tapCount = 0; }, 700);
        if (tapCount >= 3) { document.getElementById('tweaks').classList.toggle('visible'); tapCount = 0; }
    });

    // ── Init ──
    appliquerTweaks(TWEAKS);
    construireCats();

})();
</script>
</body>
</html>
